<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Online Bookstore</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="page">

<div class="topbar">
    <div class="brand">
        <div class="logo"><span>OB</span></div>
        <div>
            <h1>Online Bookstore</h1>
            <p>Browse, add, and manage your cart</p>
        </div>
    </div>

    <div class="navlinks">
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/add">Add Book</a>
    </div>

    <div class="actions">

    <a href="/cart">
        <button class="btn btn-warn">Cart</button>
    </a>

    <a href="/add">
        <button class="btn btn-success">Add Book</button>
    </a>

    </div>
</div>

<div class="hero">
    <div class="hero-inner">
        <h2>Discover Your Next Great Read</h2>
        <p>Explore books and build your cart. Use the search to quickly filter by title or author.</p>

        <div class="searchbar">
            <input id="bookSearch" type="text" placeholder="Search by title or author...">
            <button class="btn btn-accent" type="button" onclick="clearSearch()">Clear</button>
        </div>
    </div>
</div>

<div class="section-title">Featured Collection</div>

<div class="grid">

    <div class="card book-card" th:each="book : ${books}">

        <img class="card-media"
             th:src="${book.image}"
             onerror="this.onerror=null;this.src='/images/book-placeholder.svg';"
             alt="Book Image">

        <div class="under-image">
            <a th:href="@{'/cart/add/' + ${book.id}}">
                <button class="btn btn-accent" style="width:100%">Add to Cart</button>
            </a>
        </div>

        <div class="card-body">

            <a th:href="@{'/book/' + ${book.id}}" style="text-decoration:none; color:inherit">
                <h2 class="title book-title" th:text="${book.title}"></h2>
            </a>

            <p class="subtitle book-author" th:text="${book.author}"></p>

            <p class="price">
                ₹ <b th:text="${book.price}"></b>
            </p>

            <p class="desc" th:text="${book.description}"></p>

            <div class="card-actions">
                <a th:href="@{'/delete/' + ${book.id}}">
                    <button class="btn btn-danger">Delete</button>
                </a>

                <a th:href="@{'/add'}">
                    <button class="btn btn-success" type="button">Add New Book</button>
                </a>
            </div>

        </div>
    </div>

</div>

</div>

<script>
    const searchInput = document.getElementById('bookSearch');
    const cards = Array.from(document.querySelectorAll('.book-card'));

    function normalize(s) {
        return (s || '').toString().toLowerCase().trim();
    }

    function applySearch() {
        const q = normalize(searchInput.value);
        cards.forEach(card => {
            const title = normalize(card.querySelector('.book-title')?.textContent);
            const author = normalize(card.querySelector('.book-author')?.textContent);
            const match = !q || title.includes(q) || author.includes(q);
            card.style.display = match ? '' : 'none';
        });
    }

    function clearSearch() {
        searchInput.value = '';
        applySearch();
        searchInput.focus();
    }

    searchInput.addEventListener('input', applySearch);
</script>
</body>
</html>
