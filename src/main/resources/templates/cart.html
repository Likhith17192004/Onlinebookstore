<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="page">

    <div class="topbar">
        <div class="brand">
            <div class="logo"><span>OB</span></div>
            <div>
                <h1>My Cart</h1>
                <p>Items you added from the store</p>
            </div>
        </div>
        <div class="navlinks">
            <a href="/">Home</a>
            <a href="/add">Add Book</a>
        </div>
        <div class="actions">
            <a href="/"><button class="btn btn-accent">Back to Store</button></a>
        </div>
    </div>

    <div class="grid">

        <div class="card" th:each="item : ${cartItems}">

            <img class="card-media" th:src="${item.image}">

            <div class="card-body">

                <h2 class="title" th:text="${item.title}"></h2>

                <p class="price">
                    ₹ <b th:text="${item.price}"></b>
                </p>

                <div class="card-actions">
                    <a th:href="@{'/cart/delete/' + ${item.id}}">
                        <button class="btn btn-danger">Remove</button>
                    </a>
                </div>

            </div>
        </div>

    </div>

    <div class="panel" style="margin-top:16px">
        <h2>Order Summary</h2>
        <p class="help">Total</p>
        <div class="price" style="margin-top:6px">
            ₹ <b th:text="${total}"></b>
        </div>

        <div class="card-actions" style="margin-top:14px">
            <a href="/cart/checkout">
                <button class="btn btn-success" style="width:100%">Buy / Checkout</button>
            </a>
        </div>

        <p class="help" th:if="${param.success}" style="margin-top:10px">Purchase complete. Cart cleared.</p>
    </div>

</div>

</body>
</html>
