<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .cart-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            display:flex;
   
    flex-wrap:wrap;
    justify-content:center;
        }

        .cart-card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:300px;
    height:380px;
}
        

        img{
            width:300px;
            height:180px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            color:green;
            font-weight:bold;
            margin-top:10px;
            margin-bottom:10px;
        }

        .remove-btn{
    background:red;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

.remove-btn:hover{
    background:darkred;
}
    </style>
</head>

<body>

<h1>🛒 My Cart</h1>

<div class="cart-container">

    <div class="cart-card" th:each="item : ${cartItems}">

        <img th:src="${item.image}">

        <h2 th:text="${item.title}"></h2>

        <p class="price">
            ₹ <span th:text="${item.price}"></span>
        </p>

        <a th:href="@{'/cart/delete/' + ${item.id}}">
    <button class="remove-btn">Remove</button>
</a>

    </div>

</div>

</body>
</html>
