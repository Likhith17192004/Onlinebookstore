<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="page">

    <div class="topbar">
        <div class="brand">
            <div class="logo"><span>OB</span></div>
            <div>
                <h1>Add Book</h1>
                <p>Create a new listing for the store</p>
            </div>
        </div>
        <div class="navlinks">
            <a href="/">Home</a>
            <a href="/cart">Cart</a>
        </div>
        <div class="actions">
            <a href="/"><button class="btn btn-accent">Back</button></a>
            <a href="/cart"><button class="btn btn-warn">Cart</button></a>
        </div>
    </div>

    <div class="panel">

        <form action="/save" method="post">

            <label class="field">
                <div class="help">Title</div>
                <input class="input" type="text" name="title" placeholder="Eg. Atomic Habits" required>
            </label>

            <label class="field">
                <div class="help">Author</div>
                <input class="input" type="text" name="author" placeholder="Eg. James Clear" required>
            </label>

            <label class="field">
                <div class="help">Price (₹)</div>
                <input class="input" type="number" name="price" placeholder="Eg. 499" min="0" step="0.01" required>
            </label>

            <label class="field">
                <div class="help">Image URL</div>
                <input class="input" type="text" name="image" placeholder="Paste a direct image link (https://...jpg/png)" required>
            </label>

            <label class="field">
                <div class="help">Description</div>
                <textarea class="textarea" name="description" placeholder="Short summary of the book..." required></textarea>
            </label>

            <button class="btn btn-success" type="submit" style="width:100%">Save Book</button>

        </form>

    </div>

</div>

</body>
</html>
